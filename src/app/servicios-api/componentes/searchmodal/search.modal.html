<app-modal
  [abierto]="abierto"
  [titulo]="'Resultados de búsqueda'"
  (cerrar)="cerrar()"
>

    <div *ngIf="cargando">

        Buscando...

    </div>

    <div
        *ngIf="
          !cargando &&
          resultados.length === 0
        "
    >

        No se encontraron resultados.

    </div>

    <div
        *ngFor="
          let item of resultados
        "
        class="resultado"
        (click)="navegar(item)"
    >

        <img
            [src]="item.imagen"
            [alt]="item.nombre"
            class="resultado-img"
        >

        <div>

            <h3>

                {{ item.nombre }}

            </h3>

            <p>

                {{ item.descripcion }}

            </p>

        </div>

    </div>

</app-modal>
