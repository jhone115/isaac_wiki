<app-navegacion-items>
</app-navegacion-items>

<div class="contenedor">

  <div class="filtros">

    <button
      (click)="filtrarTrinkets('todos')"
    >
      Todos
    </button>

    <button
      (click)="filtrarTrinkets('inicio')"
    >
      Disponibles desde el inicio
    </button>

    <button
      (click)="filtrarTrinkets('desbloqueables')"
    >
      Desbloqueables
    </button>

  </div>

  <div class="tabla-container">

    <table>

      <thead>

        <tr>

          <th>ID</th>
          <th>Icono</th>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Unlock</th>

        </tr>

      </thead>

      <tbody>

        <tr
          *ngFor="
            let trinket of
            trinketsFiltrados
          "
        >

          <td>
            {{ trinket.id }}
          </td>

          <td>

            <img
              [src]="obtenerRutaIcono(trinket)"
              [alt]="trinket.nombre"
              class="icono"
            >

          </td>

          <td
            class="clickable"
            (click)="seleccionarTrinket(trinket)"
          >

            {{ trinket.nombre }}

          </td>

          <td>

            {{ trinket.descripcion }}

          </td>

          <td>

            {{ trinket.unlock }}

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>

<app-modal

  [abierto]="trinketSeleccionado !== null"

  [titulo]="
    trinketSeleccionado?.nombre || ''
  "

  (cerrar)="cerrarModal()"

>

  <app-trinket-detalle

    *ngIf="trinketSeleccionado"
    [trinket]="trinketSeleccionado"

  >

  </app-trinket-detalle>

</app-modal>
